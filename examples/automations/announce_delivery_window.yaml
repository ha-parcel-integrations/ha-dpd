# Speak the expected delivery window for the next active parcel one
# hour before the planned_from timestamp. Uses the Next delivery sensor
# directly instead of an event — on the day of delivery this is the
# precise Follow My Parcel hour; otherwise it's midnight of the
# planned date and you'll hear a less useful "om 00:00".

alias: "DPD: announce next delivery window"
description: Speak the next delivery window an hour before the window opens.
mode: single

triggers:
  - trigger: template
    value_template: >-
      {% set when = states('sensor.dpd_next_delivery') %}
      {% if when not in ('unknown', 'unavailable') %}
        {{ (as_datetime(when) - now()).total_seconds() | int == 3600 }}
      {% endif %}

actions:
  - action: tts.cloud_say
    data:
      entity_id: media_player.living_room
      message: >-
        DPD-pakket onderweg, verwacht rond
        {{ as_datetime(states('sensor.dpd_next_delivery')).strftime('%H:%M') }}.
